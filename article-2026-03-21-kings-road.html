  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    html { overflow-x: hidden; }
    body { background: var(--jersey-blue); color: var(--sandy-soil); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

    :root {
      --jersey-blue:   #406577;
      --pine-barrens:  #2F4F41;
      --atlantic-navy: #21333D;
      --sandy-soil:    #F0ECE4;
      --dock-rust:     #A25632;
      --weathered-barn:#8C2F2F;
      --font-display:  'Playfair Display', Georgia, serif;
      --font-body:     'DM Sans', sans-serif;
    }

    /* ─── NAV ─────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 48px;
      background: rgba(64,101,119,0.96);
      backdrop-filter: blur(8px);
    }
    .nav-logo { height: 52px; width: auto; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      color: rgba(255,255,255,0.88); text-decoration: none;
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      position: relative; transition: color 0.25s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -3px; left: 0;
      width: 0; height: 1px; background: var(--jersey-blue); transition: width 0.3s ease;
    }
    .nav-links a:hover { color: #fff; }
    .nav-links a:hover::after { width: 100%; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; z-index: 101; }
    .hamburger span { display: block; width: 24px; height: 2px; background: rgba(255,255,255,0.85); transition: transform 0.3s ease, opacity 0.3s ease; }
    .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 99; background: rgba(33,51,61,0.97); backdrop-filter: blur(12px);
      flex-direction: column; align-items: center; justify-content: center; gap: 32px;
      opacity: 0; transition: opacity 0.35s ease;
    }
    .mobile-menu.open { display: flex; opacity: 1; }
    .mobile-menu a { color: rgba(240,236,228,0.9); font-family: var(--font-body); font-size: 18px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; }
    .mobile-menu-close { position: absolute; top: 24px; right: 24px; background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; }
    .mobile-menu a:hover { color: #A25632; }
    @keyframes mobileMenuIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── ARTICLE HERO ────────────────────────────────── */
    .article-hero {
      position: relative;
      height: 55vh;
      min-height: 400px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }
    .article-hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }
    .article-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(33,51,61,0.1) 0%, rgba(33,51,61,0.7) 70%, rgba(64,101,119,1) 100%);
    }
    .article-hero-content {
      position: relative;
      z-index: 2;
      padding: 0 8vw 56px;
      max-width: 900px;
    }
    .article-category {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      background: var(--dock-rust);
      padding: 5px 14px;
      margin-bottom: 20px;
    }
    .article-hero-title {
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 64px);
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    /* ─── ARTICLE META ────────────────────────────────── */
    .article-meta {
      padding: 32px 8vw 0;
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .article-date {
      font-family: var(--font-body);
      font-size: 13px;
      letter-spacing: 0.1em;
      color: rgba(240,236,228,0.5);
    }
    .article-byline {
      font-family: var(--font-body);
      font-size: 13px;
      color: rgba(240,236,228,0.5);
    }
    .meta-divider {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(240,236,228,0.2);
    }
    .article-share {
      margin-left: auto;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .article-share span {
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(240,236,228,0.35);
    }
    .article-share a {
      color: rgba(240,236,228,0.4);
      transition: color 0.2s;
    }
    .article-share a:hover { color: #fff; }
    .article-share svg { width: 18px; height: 18px; fill: currentColor; }
    .share-copy { display: flex; align-items: center; gap: 6px; }
    .share-copy span {
      font-family: var(--font-body);
      font-size: 11px;
      color: var(--dock-rust);
      letter-spacing: 0.05em;
    }

    /* ─── ARTICLE BODY ────────────────────────────────── */
    .article-body {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 8vw 80px;
    }
    .article-body p {
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.9;
      color: rgba(240,236,228,0.8);
      font-weight: 300;
      margin-bottom: 28px;
    }
    .article-body p:first-of-type::first-letter {
      font-family: var(--font-display);
      font-size: 3.5em;
      float: left;
      line-height: 0.8;
      margin-right: 8px;
      margin-top: 6px;
      color: var(--sandy-soil);
      font-weight: 700;
    }
    .article-body h2 {
      font-family: var(--font-display);
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 700;
      color: var(--sandy-soil);
      margin: 48px 0 24px;
      line-height: 1.2;
    }
    .article-body blockquote {
      border-left: 3px solid var(--dock-rust);
      padding: 8px 0 8px 28px;
      margin: 40px 0;
    }
    .article-body blockquote p {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 20px;
      line-height: 1.65;
      color: var(--sandy-soil);
      margin-bottom: 0;
    }
    .article-body img {
      width: 100%;
      margin: 40px 0;
      display: block;
    }
    .article-body .img-caption {
      font-family: var(--font-body);
      font-size: 12px;
      color: rgba(240,236,228,0.35);
      font-style: italic;
      text-align: center;
      margin-top: -28px;
      margin-bottom: 40px;
    }
    .article-body a {
      color: var(--dock-rust);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.2s;
    }
    .article-body a:hover { color: var(--sandy-soil); }

    /* ─── BACK TO NEWS ────────────────────────────────── */
    .article-back {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 8vw 80px;
      border-top: 1px solid rgba(240,236,228,0.08);
      padding-top: 40px;
    }
    .article-back a {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(240,236,228,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }
    .article-back a:hover { color: var(--sandy-soil); }

    /* ─── FOOTER ──────────────────────────────────────── */
    footer {
      background: var(--jersey-blue);
      border-top: 1px solid rgba(240,236,228,0.08);
      padding: 48px 8vw;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 32px;
    }
    .footer-logo { height: 72px; filter: brightness(0.8); }
    .footer-copy { font-family: var(--font-body); font-size: 11px; letter-spacing: 0.12em; color: rgba(240,236,228,0.3); text-align: center; }
    .footer-social { display: flex; gap: 18px; align-items: center; justify-content: flex-end; }
    .footer-social a { display: flex; align-items: center; justify-content: center; color: rgba(240,236,228,0.35); transition: color 0.25s; }
    .footer-social a:hover { color: #fff; }
    .footer-social svg { width: 20px; height: 20px; fill: currentColor; }

    /* ─── MOBILE ──────────────────────────────────────── */
    @media (max-width: 768px) {
      nav { padding: 18px 24px; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .article-hero { height: 40vh; min-height: 300px; }
      .article-hero-content { padding: 0 24px 40px; }
      .article-meta { padding: 24px 24px 0; }
      .article-body { padding: 36px 24px 60px; }
      .article-back { padding: 0 24px 60px; }
      .article-share { margin-left: 0; width: 100%; }
      footer { grid-template-columns: 1fr; justify-items: center; text-align: center; gap: 24px; padding: 40px 24px; }
      .footer-social { justify-content: center; flex-wrap: wrap; }
    }
  </style>

  <script>
    // ─── LIGHTWEIGHT MARKDOWN PARSER ──────────────────
    function parseMarkdown(md) {
      const lines = md.split('\n');
      let html = '';
      let inBlockquote = false;
      let inParagraph = false;

      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];

        // Headings
        if (line.startsWith('## ')) {
          if (inParagraph) { html += '</p>'; inParagraph = false; }
          if (inBlockquote) { html += '</p></blockquote>'; inBlockquote = false; }
          html += '<h2>' + line.slice(3).trim() + '</h2>';
          continue;
        }

        // Blockquotes
        if (line.startsWith('> ')) {
          if (inParagraph) { html += '</p>'; inParagraph = false; }
          if (!inBlockquote) { html += '<blockquote><p>'; inBlockquote = true; }
          else { html += ' '; }
          html += line.slice(2).trim();
          continue;
        } else if (inBlockquote) {
          html += '</p></blockquote>';
          inBlockquote = false;
        }

        // Images: ![alt](src)
        const imgMatch = line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
        if (imgMatch) {
          if (inParagraph) { html += '</p>'; inParagraph = false; }
          html += '<img src="' + imgMatch[2] + '" alt="' + imgMatch[1] + '" />';
          // Check if next line is a caption (starts with ^)
          if (i + 1 < lines.length && lines[i + 1].startsWith('^')) {
            html += '<p class="img-caption">' + lines[i + 1].slice(1).trim() + '</p>';
            i++; // skip caption line
          }
          continue;
        }

        // Blank line = paragraph break
        if (line.trim() === '') {
          if (inParagraph) { html += '</p>'; inParagraph = false; }
          continue;
        }

        // Regular text = paragraph content
        if (!inParagraph) {
          html += '<p>';
          inParagraph = true;
        } else {
          html += ' ';
        }

        // Inline formatting: bold, italic, links
        line = line
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

        html += line;
      }

      // Close any open tags
      if (inParagraph) html += '</p>';
      if (inBlockquote) html += '</p></blockquote>';

      return html;
    }

    // ─── LOAD ARTICLE FROM MARKDOWN FILE ──────────────
    (function() {
      const container = document.getElementById('article-content');
      const src = container.dataset.src;

      if (!src) {
        container.innerHTML = '<p>No article source specified.</p>';
        return;
      }

      fetch(src)
        .then(r => {
          if (!r.ok) throw new Error('File not found');
          return r.text();
        })
        .then(md => {
          container.innerHTML = parseMarkdown(md);
        })
        .catch(() => {
          container.innerHTML = '<p style="color: rgba(240,236,228,0.4);">Article not found. Check that the .md file is in the same folder.</p>';
        });
    })();
  </script>


  <!-- MOBILE MENU JS -->
  <script>
    (function() {
      var hamburger = document.getElementById('hamburger');
      var mobileMenu = document.getElementById('mobile-menu');
      if (!hamburger || !mobileMenu) return;

      hamburger.addEventListener('click', function() {
      document.getElementById('menu-close').addEventListener('click', function() {
        document.getElementById('mobile-menu').classList.remove('open');
        document.querySelector('.hamburger').classList.remove('active');
        document.body.style.overflow = '';
      });
      
        hamburger.classList.toggle('active');
        mobileMenu.classList.toggle('open');
        document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
      });

      mobileMenu.querySelectorAll('a').forEach(function(link) {
        link.addEventListener('click', function() {
          hamburger.classList.remove('active');
          mobileMenu.classList.remove('open');
          document.body.style.overflow = '';
        });
      });
    })();
  </script>
