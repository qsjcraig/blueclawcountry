<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News — Blue Claw Country</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; scroll-padding-top: 80px; }
    html { overflow-x: hidden; }
    body { background: #406577; color: #F0ECE4; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

    :root {
      --jersey-blue:   #406577;
      --pine-barrens:  #2F4F41;
      --atlantic-navy: #21333D;
      --sandy-soil:    #F0ECE4;
      --dock-rust:     #A25632;
      --font-display:  'Playfair Display', Georgia, serif;
      --font-body:     'DM Sans', sans-serif;
    }

    /* ─── NAV ─────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 48px;
      transition: background 0.5s ease, padding 0.4s ease;
    }
    nav.scrolled { background: rgba(33,51,61,0.96); backdrop-filter: blur(8px); padding: 14px 48px; }
    .nav-logo { height: 52px; width: auto; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)); transition: height 0.4s ease; }
    nav.scrolled .nav-logo { height: 42px; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      color: rgba(255,255,255,0.88); text-decoration: none;
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      position: relative; transition: color 0.25s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -3px; left: 0;
      width: 0; height: 1px; background: var(--jersey-blue); transition: width 0.3s ease;
    }
    .nav-links a:hover { color: #fff; }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .nav-links a.active { color: #fff; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; z-index: 101; }
    .hamburger span { display: block; width: 24px; height: 2px; background: rgba(255,255,255,0.85); transition: transform 0.3s ease, opacity 0.3s ease; }
    .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 200; background: rgba(33,51,61,0.97); backdrop-filter: blur(12px);
      flex-direction: column; align-items: center; justify-content: center; gap: 32px;
      opacity: 0; transition: opacity 0.35s ease;
    }
    .mobile-menu.open { display: flex; opacity: 1; }
    .mobile-menu a { color: rgba(240,236,228,0.9); font-family: var(--font-body); font-size: 18px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; }
    .mobile-menu-close { position: absolute; top: 24px; right: 24px; background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; }
    .mobile-menu a:hover { color: #A25632; }
    @keyframes mobileMenuIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── PAGE HERO ───────────────────────────────────── */
    .page-hero {
      position: relative; height: 44vh; min-height: 300px;
      overflow: hidden; display: flex; align-items: flex-end;
      padding: 0 8vw 64px;
    }
    .page-hero-bg {
      position: absolute; inset: -20%;
      background-image: url('news-hero-desktop.jpg');
      background-size: cover; background-position: center 40%;
    }
    .page-hero-overlay { display: none; }
    .page-hero-content { position: relative; z-index: 2; }
    .page-eyebrow {
      font-family: var(--font-body); font-size: 11px; font-weight: 500;
      letter-spacing: 0.3em; text-transform: uppercase; color: var(--jersey-blue); margin-bottom: 14px;
    }
    .page-title {
      font-family: var(--font-display); font-size: clamp(48px, 7vw, 96px);
      font-weight: 700; color: #fff; line-height: 1; letter-spacing: -0.02em;
    }

    /* ─── FILTER BAR ──────────────────────────────────── */
    .filter-bar {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      padding: 36px 8vw 0;
      max-width: 1400px; margin: 0 auto;
    }
    .filter-btn {
      padding: 9px 22px;
      background: transparent;
      border: 1px solid rgba(240,236,228,0.2);
      color: rgba(240,236,228,0.5);
      font-family: var(--font-body); font-size: 11px; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s;
    }
    .filter-btn:hover { border-color: rgba(240,236,228,0.5); color: rgba(240,236,228,0.8); }
    .filter-btn.active { background: var(--dock-rust); border-color: var(--dock-rust); color: #fff; }

    /* ─── NEWS GRID ───────────────────────────────────── */
    #news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2px;
      padding: 36px 8vw 120px;
      max-width: 1400px; margin: 0 auto;
    }

    /* ─── NEWS CARD ───────────────────────────────────── */
    .news-card {
      position: relative; overflow: hidden;
      background: var(--atlantic-navy);
      cursor: pointer;
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .news-card.visible { opacity: 1; transform: translateY(0); }
    .news-card:hover .card-img { transform: scale(1.04); }
    .news-card:hover .card-overlay { opacity: 1; }

    .card-media {
      position: relative; overflow: hidden;
      aspect-ratio: 1/1;
      background: #1a2f3a;
    }
    .card-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.6s ease;
    }
    .card-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(145deg, var(--atlantic-navy), #1a2f3a);
    }
    .card-placeholder svg { width: 48px; height: 48px; fill: rgba(240,236,228,0.15); }
    .card-overlay {
      position: absolute; inset: 0;
      background: rgba(162,86,50,0.15);
      opacity: 0; transition: opacity 0.3s;
      display: flex; align-items: center; justify-content: center;
    }
    .play-btn {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(255,255,255,0.9);
      display: flex; align-items: center; justify-content: center;
    }
    .play-btn svg { width: 20px; height: 20px; fill: var(--atlantic-navy); margin-left: 3px; }

    .card-tag {
      position: absolute; top: 14px; left: 14px;
      padding: 5px 12px;
      font-family: var(--font-body); font-size: 9px; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase; color: #fff;
    }
    .tag-video   { background: var(--jersey-blue); }
    .tag-post    { background: var(--jersey-blue); }
    .tag-show    { background: var(--jersey-blue); }
    .tag-photo   { background: #5a4a3a; }
    .tag-poster  { background: #3a3a5a; }

    .card-body { padding: 22px 24px 26px; }
    .card-date {
      font-family: var(--font-body); font-size: 11px;
      color: rgba(240,236,228,0.35); letter-spacing: 0.1em; margin-bottom: 8px;
    }
    .card-title {
      font-family: var(--font-display); font-size: 20px; font-weight: 700;
      color: #fff; line-height: 1.25; margin-bottom: 10px;
    }
    .card-desc {
      font-family: var(--font-body); font-size: 13px; line-height: 1.7;
      color: rgba(240,236,228,0.5); font-weight: 300;
    }
    .card-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 16px;
      font-family: var(--font-body); font-size: 11px; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(240,236,228,0.4); text-decoration: none;
      transition: gap 0.2s; cursor: pointer;
      background: none; border: none; padding: 0;
    }
    .card-link:hover { gap: 10px; }
    .card-link svg { width: 12px; height: 12px; fill: currentColor; }
    .card-link-arrow { transition: transform 0.3s ease; }
    .card-link.expanded .card-link-arrow { transform: rotate(90deg); }
    .card-body-text {
      display: none;
      font-family: var(--font-body); font-size: 14px; line-height: 1.75;
      color: rgba(240,236,228,0.7); font-weight: 300;
      margin-bottom: 16px; padding-top: 12px;
      border-top: 1px solid rgba(240,236,228,0.08);
    }
    .card-body-text.open { display: block; }

    /* ─── VIDEO MODAL ─────────────────────────────────── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.88);
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal-inner {
      position: relative; width: 90vw; max-width: 900px;
    }
    .modal-inner iframe {
      width: 100%; aspect-ratio: 16/9; border: none; display: block;
    }
    .modal-close {
      position: absolute; top: -44px; right: 0;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.7); font-size: 28px; line-height: 1;
      transition: color 0.2s;
    }
    .modal-close:hover { color: #fff; }

    /* ─── FOOTER ──────────────────────────────────────── */
    footer {
      background: var(--jersey-blue);
      border-top: 1px solid rgba(240,236,228,0.08);
      padding: 48px 8vw;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center; gap: 32px;
    }
    .footer-logo { height: 72px; filter: brightness(0.8); }
    .footer-copy { font-family: var(--font-body); font-size: 11px; letter-spacing: 0.12em; color: rgba(240,236,228,0.3); text-align: center; }
    .footer-social { display: flex; gap: 18px; align-items: center; justify-content: flex-end; }
    .footer-social a { display: flex; align-items: center; justify-content: center; color: rgba(240,236,228,0.35); transition: color 0.25s; }
    .footer-social a:hover { color: #fff; }
    .footer-social svg { width: 20px; height: 20px; fill: currentColor; }

    /* ─── MOBILE ──────────────────────────────────────── */
    @media (max-width: 768px) {
      footer { grid-template-columns: 1fr; justify-items: center; text-align: center; gap: 24px; padding: 40px 24px; }
      .footer-social { justify-content: center; flex-wrap: wrap; }
      nav { padding: 18px 24px; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      #news-grid { grid-template-columns: 1fr; padding: 24px 24px 80px; gap: 2px; }
      .filter-bar { padding: 24px 24px 0; }
    }
  </style>

  <script>
    const FILTERS = ['all','video','post','show','photo','poster'];

    function formatDate(str) {
      const d = new Date(str + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function tagClass(type) {
      const map = { video:'tag-video', post:'tag-post', show:'tag-show', photo:'tag-photo', poster:'tag-poster' };
      return map[type] || 'tag-post';
    }

    function placeholderIcon(type) {
      if (type === 'video') return `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
      if (type === 'show') return `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>`;
      return `<svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>`;
    }

    function getTypes(item) {
      if (Array.isArray(item.type)) return item.type;
      return [item.type];
    }

    function primaryType(item) {
      return getTypes(item)[0];
    }

    function buildCard(item) {
      const hasImage = item.image && item.image.length > 0;
      const isVideo = getTypes(item).includes('video');

      const mediaHTML = hasImage
        ? `<img class="card-img" src="${item.image}" alt="${item.title}" loading="lazy" />`
        : `<div class="card-placeholder">${placeholderIcon(primaryType(item))}</div>`;

      const overlayHTML = isVideo
        ? `<div class="card-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>`
        : `<div class="card-overlay"></div>`;

      const linkLabel = { video: 'Watch Now', post: 'View Post', show: 'Get Tickets', photo: 'View', poster: 'View' }[primaryType(item)] || 'View';

      const bodyHTML = item.body
        ? `<div class="card-body-text" id="body-${item.id}">${item.body}</div>`
        : '';

      const linkHTML = item.article
        ? `<a class="card-link" href="${item.article}" data-article="true" onclick="event.stopPropagation()">
            Read More
            <svg class="card-link-arrow" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
           </a>`
        : item.body
        ? `<button class="card-link" onclick="toggleBody('${item.id}', event)">
            Read More
            <svg class="card-link-arrow" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
           </button>`
        : (item.url && item.url !== '#'
            ? (isVideo && item.embed
                ? `<button class="card-link" onclick="event.stopPropagation(); openModal('${item.embed}')">
                    ${linkLabel}
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
                   </button>`
                : `<a class="card-link" href="${item.url}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">
                    ${linkLabel}
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
                   </a>`)
            : '');

      return `
      <div class="news-card" id="card-${item.id}" data-type="${primaryType(item)}" data-embed="${item.embed || ''}" data-url="${item.url || ''}" data-article="${item.article || ''}">
        <div class="card-media">
          ${mediaHTML}
          ${overlayHTML}
          <span class="card-tag ${tagClass(primaryType(item))}">${item.tag}</span>
        </div>
        <div class="card-body">
          <p class="card-date">${formatDate(item.date)}</p>
          <h3 class="card-title">${item.title}</h3>
          <p class="card-desc">${item.description}</p>
          ${bodyHTML}
          ${linkHTML}
        </div>
      </div>`;
    }

    let allItems = [];

    function renderGrid(filter) {
      const grid = document.getElementById('news-grid');
      const filtered = filter === 'all'
        ? allItems
        : allItems.filter(i => getTypes(i).includes(filter) || (i.tag && i.tag.toLowerCase() === filter));
      grid.innerHTML = filtered.map(buildCard).join('');

      // Attach click handlers
      grid.querySelectorAll('.news-card').forEach(card => {
        card.addEventListener('click', () => {
          const article = card.dataset.article;
          const embed = card.dataset.embed;
          const url = card.dataset.url;
          if (article && article.length > 1) {
            window.location.href = article;
          } else if (embed && embed.length > 1) {
            openModal(embed);
          } else if (url && url.length > 1 && url !== '#' && url.startsWith('http')) {
            window.open(url, '_blank');
          }
        });
      });

      // Scroll reveal
      requestAnimationFrame(() => {
        grid.querySelectorAll('.news-card').forEach((card, i) => {
          setTimeout(() => card.classList.add('visible'), i * 60);
        });
      });
    }

    function toggleBody(id, e) {
      e.stopPropagation();
      const bodyEl = document.getElementById('body-' + id);
      const btn = e.currentTarget;
      const isOpen = bodyEl.classList.toggle('open');
      btn.classList.toggle('expanded', isOpen);
      btn.childNodes[0].textContent = isOpen ? 'Close ' : 'Read More ';
    }

    function checkDeepLink() {
      const hash = window.location.hash;
      if (!hash) return;
      const id = hash.replace('#', '');
      const card = document.getElementById('card-' + id);
      if (!card) return;
      setTimeout(() => {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.style.outline = '2px solid var(--jersey-blue)';
        setTimeout(() => card.style.outline = '', 2000);
        // auto-expand body if it has one
        const bodyEl = document.getElementById('body-' + id);
        if (bodyEl) {
          bodyEl.classList.add('open');
          const btn = card.querySelector('.card-link');
          if (btn) { btn.classList.add('expanded'); btn.childNodes[0].textContent = 'Close '; }
        }
      }, 400);
    }

    function openModal(embedUrl) {
      const modal = document.getElementById('video-modal');
      const iframe = document.getElementById('modal-iframe');
      iframe.src = embedUrl + '?autoplay=1';
      modal.classList.add('open');
    }

    function closeModal() {
      const modal = document.getElementById('video-modal');
      const iframe = document.getElementById('modal-iframe');
      modal.classList.remove('open');
      iframe.src = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('video-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGrid(btn.dataset.filter);
      });
    });

    // Load news.json
    fetch('news.json')
      .then(r => r.json())
      .then(data => {
        allItems = data;
        renderGrid('all');
        checkDeepLink();
      })
      .catch(() => {
        document.getElementById('news-grid').innerHTML = '<p style="padding:48px;color:rgba(240,236,228,0.4);">No news yet — check back soon.</p>';
      });
  </script>

  <!-- MOBILE MENU JS -->
  <script>
    (function() {
      var hamburger = document.getElementById('hamburger');
      var mobileMenu = document.getElementById('mobile-menu');
      var menuClose = document.getElementById('menu-close');
      if (!hamburger || !mobileMenu) return;

      hamburger.addEventListener('click', function() {
        hamburger.classList.toggle('active');
        mobileMenu.classList.toggle('open');
        document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
      });

      if (menuClose) {
        menuClose.addEventListener('click', function() {
          hamburger.classList.remove('active');
          mobileMenu.classList.remove('open');
          document.body.style.overflow = '';
        });
      }

      mobileMenu.querySelectorAll('a').forEach(function(link) {
        link.addEventListener('click', function() {
          hamburger.classList.remove('active');
          mobileMenu.classList.remove('open');
          document.body.style.overflow = '';
        });
      });
    })();

    // NAV SCROLL
    var navbar = document.querySelector('nav');
    window.addEventListener('scroll', function() {
      navbar.classList.toggle('scrolled', window.scrollY > 60);
    }, { passive: true });

    // ─── HERO IMAGE SWAP ──────────────────────────────────
    (function() {
      var bg = document.getElementById('hero-bg');
      if (!bg) return;
      var desktopPos = bg.dataset.desktopPos || 'center center';
      var mobilePos  = bg.dataset.mobilePos  || 'center center';
      function swapHero() {
        if (window.innerWidth <= 768) {
          bg.style.backgroundImage = "url('news-hero-mobile.jpg')";
          bg.style.backgroundPosition = mobilePos;
        } else {
          bg.style.backgroundImage = "url('news-hero-desktop.jpg')";
          bg.style.backgroundPosition = desktopPos;
        }
      }
      swapHero();
      window.addEventListener('resize', swapHero, { passive: true });
    })();
  </script>
